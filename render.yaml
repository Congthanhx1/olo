services:
  # Backend API
  - type: web
    name: digitalstore-api
    env: docker
    plan: free
    healthCheckPath: /api/products
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__DefaultConnection
        sync: false
      - key: Jwt__SecretKey
        generateValue: true
      - key: Jwt__Issuer
        value: DigitalStore.API
      - key: Jwt__Audience
        value: DigitalStore.Client

# Frontend Static Site (Dùng dấu gạch dưới: static_sites)
static_sites:
  - name: digitalstore-web
    env: static
    buildCommand: "" 
    publishDir: src/DigitalStore.Client
