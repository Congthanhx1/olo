services:
  # Backend API
  - type: web
    name: digitalstore-api
    env: docker
    plan: free
    healthCheckPath: /api/products
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__DefaultConnection
        sync: false # User enters this in Render UI once
      - key: Jwt__SecretKey
        generateValue: true # Render generates a random key automatically!
      - key: Jwt__Issuer
        value: DigitalStore.API
      - key: Jwt__Audience
        value: DigitalStore.Client

  # Frontend Static Site
  - type: static_site
    name: digitalstore-web
    buildCommand: "" # No build needed for static HTML
    publishDir: src/DigitalStore.Client # Thư mục chứa file HTML/JS của bạn
