services:
  # Backend API
  - type: web
    name: digitalstore-api
    runtime: docker
    plan: free
    healthCheckPath: /api/products
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__DefaultConnection
        sync: false
      - key: Jwt__SecretKey
        generateValue: true
      - key: Jwt__Issuer
        value: DigitalStore.API
      - key: Jwt__Audience
        value: DigitalStore.Client

  # Frontend Static Site (Theo chuẩn Blueprint mới nhất)
  - type: web
    name: digitalstore-web
    runtime: static
    staticPublishPath: src/DigitalStore.Client
