  - type: web
    name: digitalstore-api
    runtime: docker
    plan: free
    healthCheckPath: /api/products
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__DefaultConnection
        value: postgresql://postgres:%40Congthanhx1@db.gdoaxftrniznvhrtaxnr.supabase.co:5432/postgres
      - key: Jwt__SecretKey
